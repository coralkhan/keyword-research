name: Keyword Research

on:
  repository_dispatch:
    types: [run_keyword_research]

  workflow_dispatch:
    inputs:
      keyword:
        description: "Seed keyword to research"
        required: true
        default: "gaming phones"
      callback_url:
        description: "Apps Script Web App URL to POST results back"
        required: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run keyword engine
        id: run_engine
        run: |
          SEED="${{ github.event.client_payload.keyword || github.event.inputs.keyword }}"
          OUTPUT=$(echo "$SEED" | tr ' ' '_' | tr '[:upper:]' '[:lower:]')
          echo "SEED=$SEED"     >> $GITHUB_ENV
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV

          # run the engine — capture exit code without failing the workflow
          python keyword_engine.py --seed "$SEED" --output "$OUTPUT"
          EXIT_CODE=$?
          echo "EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV

          # exit code 2 = bad seed (not a crash) — handle gracefully
          if [ $EXIT_CODE -eq 2 ]; then
            echo "BAD_SEED=true" >> $GITHUB_ENV
            echo "::warning::Seed '$SEED' was rejected by validation. Apps Script will be notified."
            exit 0   # don't fail the workflow, just notify back
          fi

          exit $EXIT_CODE
        continue-on-error: false

      - name: POST results back to Apps Script
        env:
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || github.event.inputs.callback_url }}
          RUN_ID:       ${{ github.event.client_payload.run_id || '' }}
        run: |
          python - <<'PYEOF'
          import os, json, glob, requests, sys

          callback_url = os.environ.get("CALLBACK_URL", "").strip()
          seed         = os.environ.get("SEED", "").strip()
          run_id       = os.environ.get("RUN_ID", "").strip()
          output       = os.environ.get("OUTPUT", "").strip()
          bad_seed     = os.environ.get("BAD_SEED", "").strip() == "true"

          if not callback_url:
              print("No callback URL — skipping POST.")
              sys.exit(0)

          # if seed was bad, notify Apps Script so it can retry
          if bad_seed:
              payload = {
                  "status":  "bad_seed",
                  "run_id":  run_id,
                  "keyword": seed,
                  "error":   "Seed keyword was rejected: incomplete or returns no autosuggest results",
                  "results": [],
              }
              print(f"Notifying Apps Script of bad seed: {seed}")
              r = requests.post(callback_url, json=payload, timeout=30,
                                headers={"Content-Type": "application/json"})
              print(f"Callback response: {r.status_code}")
              sys.exit(0)

          # normal success path — find and send results
          candidates = glob.glob(f"{output}_keywords.json") or glob.glob("*_keywords.json")
          if not candidates:
              print("ERROR: No results JSON file found.")
              payload = {
                  "status":  "error",
                  "run_id":  run_id,
                  "keyword": seed,
                  "error":   "No results file generated",
                  "results": [],
              }
              requests.post(callback_url, json=payload, timeout=30,
                            headers={"Content-Type": "application/json"})
              sys.exit(1)

          with open(candidates[0], encoding="utf-8") as f:
              all_results = json.load(f)

          print(f"Sending {len(all_results)} results to Apps Script...")
          print("Top 3 preview:")
          for k in all_results[:3]:
              print(f"  {k['rank']}. {k['keyword']} | score={k['boom_score']} | {k['trend_status']}")

          payload = {
              "status":  "success",
              "run_id":  run_id,
              "keyword": seed,
              "results": all_results,
          }

          r = requests.post(callback_url, json=payload, timeout=30,
                            headers={"Content-Type": "application/json"})
          print(f"Callback response: {r.status_code}")

          if r.status_code == 200:
              print("SUCCESS — Apps Script will now write the blog.")
          else:
              print(f"WARNING — unexpected status: {r.status_code} | {r.text[:200]}")

          PYEOF

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keyword-results-${{ github.run_number }}
          path: "*_keywords.*"
          retention-days: 30
