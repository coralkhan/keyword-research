name: Keyword Research

on:
  repository_dispatch:
    types: [run_keyword_research]

  workflow_dispatch:
    inputs:
      keyword:
        description: "Seed keyword to research"
        required: true
        default: "gaming phones"
      callback_url:
        description: "Apps Script webhook URL to POST results back"
        required: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run keyword engine
        run: |
          SEED="${{ github.event.client_payload.keyword || github.event.inputs.keyword }}"
          OUTPUT=$(echo "$SEED" | tr ' ' '_' | tr '[:upper:]' '[:lower:]')
          echo "SEED=$SEED" >> $GITHUB_ENV
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV
          python keyword_engine.py --seed "$SEED" --output "$OUTPUT"

      - name: Read results and send callback
        run: |
          python - <<'PYEOF'
          import os, json, requests, glob

          seed   = os.environ.get("SEED", "")
          output = os.environ.get("OUTPUT", "")

          # find the output JSON file
          candidates = glob.glob(f"{output}_keywords.json") or glob.glob("*_keywords.json")
          if not candidates:
              print("ERROR: No results JSON file found")
              raise SystemExit(1)

          results_file = candidates[0]
          print(f"Reading results from: {results_file}")

          with open(results_file, encoding="utf-8") as f:
              data = json.load(f)

          # send top 20 only to keep payload small
          top20 = data[:20]

          callback_url = (
              "${{ github.event.client_payload.callback_url }}"
              or "${{ github.event.inputs.callback_url }}"
          ).strip()

          if not callback_url:
              print("No callback URL provided -- skipping POST")
              print(f"Top 3 results preview:")
              for k in top20[:3]:
                  print(f"  {k['rank']}. {k['keyword']} | score={k['boom_score']} | {k['trend_status']}")
          else:
              payload = {"status": "success", "keyword": seed, "results": top20}
              r = requests.post(callback_url, json=payload, timeout=30)
              print(f"Callback response: {r.status_code}")
              if r.status_code != 200:
                  print(f"Callback body: {r.text[:300]}")

          PYEOF

      - name: Upload full results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyword-results-${{ github.run_number }}
          path: "*_keywords.*"
          retention-days: 30
